{% if page.last_updated %}
<style>
  .last-updated {
    font-size: 0.85rem;
    color: #767676;
    margin-top: 2rem;
    border-top: 1px solid #e1e4e8;
    padding-top: 0.5rem;
  }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var mainContent = document.querySelector('.main-content');
    if (!mainContent) return;
    var isJa = window.location.pathname.indexOf('index_ja') !== -1;
    var p = document.createElement('p');
    p.className = 'last-updated';
    p.textContent = (isJa ? '最終更新日: ' : 'Last updated: ') + '{{ page.last_updated }}';
    mainContent.appendChild(p);
  });
</script>
{% endif %}
<style>
  .page-header {
    position: relative;
  }
  .lang-switcher {
    position: absolute;
    top: 1rem;
    right: 1.5rem;
    font-size: 1.1rem;
  }
  .lang-switcher a {
    color: rgba(255, 255, 255, 0.75);
    text-decoration: none;
  }
  .lang-switcher a:hover {
    color: #fff;
    text-decoration: underline;
  }
  .lang-switcher .current-lang {
    color: #fff;
    font-weight: bold;
  }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var isJa = window.location.pathname.indexOf('index_ja') !== -1;
    var header = document.querySelector('.page-header');
    if (!header) return;
    var div = document.createElement('div');
    div.className = 'lang-switcher';
    div.innerHTML = isJa
      ? '<a href="/">English</a> / <span class="current-lang">日本語</span>'
      : '<span class="current-lang">English</span> / <a href="/index_ja">日本語</a>';
    header.appendChild(div);
  });
</script>
